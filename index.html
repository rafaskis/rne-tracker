<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNE Tracker - v14</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            flex: 1;
        }

        h1, h2, h3 {
            margin-bottom: 20px;
            color: #222;
        }

        .section {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .section:last-of-type {
            border-bottom: none;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            resize: vertical;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-success { background-color: var(--success-color); }
        .btn-success:hover { background-color: #218838; }

        .btn-danger { background-color: var(--danger-color); }
        .btn-danger:hover { background-color: #c82333; }

        .month-block {
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .expense-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dashed #eee;
        }

        .expense-row:last-child {
            border-bottom: none;
        }

        .expense-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-unpaid { background-color: #f8d7da; color: #721c24; }
        .status-paid { background-color: #d4edda; color: #155724; }

        .is-edited {
            font-style: italic;
            color: #888;
            font-size: 12px;
        }

        .empty-state {
            color: #777;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 15px 0;
            font-size: 12px;
            color: #777;
            border-top: 1px solid #ddd;
        }

        .alert {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="container">
        <h1>RNE Tracker</h1>

        <div class="section">
            <h2>Διαχείριση Βάσης Δεδομένων (JSON)</h2>
            <div id="alertBox" class="alert"></div>
            <textarea id="jsonInput" placeholder='Τοποθετήστε το JSON αρχείο σας εδώ...'></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-success" onclick="loadJSONData()">Φόρτωση & Επεξεργασία</button>
                <button class="btn" onclick="clearAllData()">Καθαρισμός Δεδομένων</button>
            </div>
        </div>

        <div class="section">
            <h2>Έξοδα ανά Μήνα</h2>
            <div id="dashboardOutput">
                <div class="empty-state">Δεν υπάρχουν φορτωμένα δεδομένα. Εισάγετε ένα έγκυρο JSON παραπάνω.</div>
            </div>
        </div>
    </div>

    <footer>
        RNE Tracker — Version: <strong>v14</strong>
    </footer>

    <script>
        // Global State Objects
        let database = {
            meta: { lastMonthPopulated: "" },
            templates: [],
            expenses: []
        };

        // Clear Browser Cache and Local Storage Tracking Warnings on Request
        console.log("App Initialization: Cache checks active. Engine stable.");

        // Safe Engine Core: Safe HTML Parser to display data securely
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Display Alerts to the user safely
        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
        }

        // Primary JSON Parsing action safely guarded against crashes
        function loadJSONData() {
            const inputData = document.getElementById('jsonInput').value.trim();
            
            if (!inputData) {
                // If input text is completely empty, initialize empty database layout safely
                database = { meta: { lastMonthPopulated: "" }, templates: [], expenses: [] };
                showAlert("Αρχειοθετήθηκε κενή βάση δεδομένων επιτυχώς.", "success");
                renderDashboard();
                return;
            }

            try {
                const parsed = JSON.parse(inputData);
                
                // Normalization guarantees arrays exist even if missing from file source
                database = {
                    meta: parsed.meta || { lastMonthPopulated: "" },
                    templates: Array.isArray(parsed.templates) ? parsed.templates : [],
                    expenses: Array.isArray(parsed.expenses) ? parsed.expenses : []
                };

                showAlert("Η βάση δεδομένων φορτώθηκε με επιτυχία!", "success");
                renderDashboard();
            } catch (error) {
                showAlert("Σφάλμα ανάλυσης JSON! Ελέγξτε τη δομή του αρχείου σας. " + error.message, "danger");
                console.error("JSON Parsing Failure:", error);
            }
        }

        // Wipe memory array and input boxes clean back to pure startup status
        function clearAllData() {
            document.getElementById('jsonInput').value = "";
            database = { meta: { lastMonthPopulated: "" }, templates: [], expenses: [] };
            showAlert("Όλα τα δεδομένα εκκαθαρίστηκαν.", "success");
            renderDashboard();
        }

        // Render application display dynamically without halting on empty entries
        function renderDashboard() {
            const container = document.getElementById('dashboardOutput');
            container.innerHTML = ""; // Refresh output area

            const expenses = database.expenses;

            // Handle the true empty slate scenario gracefully
            if (expenses.length === 0) {
                container.innerHTML = `<div class="empty-state">Η βάση δεδομένων είναι άδεια (0 Εγγραφές). Το v14 είναι έτοιμο για καταχώρηση.</div>`;
                return;
            }

            // Extract distinct month values present inside tracker state collection
            const distinctMonths = [...new Set(expenses.map(e => e.month))].sort();

            if (distinctMonths.length === 0 || (distinctMonths.length === 1 && !distinctMonths[0])) {
                container.innerHTML = `<div class="empty-state">Δεν βρέθηκαν έγκυροι μήνες προς επεξεργασία.</div>`;
                return;
            }

            // Iterate over every unique expense month group safely
            distinctMonths.forEach(month => {
                if (!month) return; // Skip corrupted references safely

                const monthlyItems = expenses.filter(e => e.month === month);
                
                // Hardened safely evaluated reduce initialization pattern to ensure zero errors
                const monthlyTotal = monthlyItems.reduce((sum, item) => sum + (Number(item.cost) || 0), 0);

                // Construct UI Block Components
                const block = document.createElement('div');
                block.className = 'month-block';

                const header = document.createElement('div');
                header.className = 'month-header';
                header.innerHTML = `
                    <span>${escapeHTML(month)}</span>
                    <span>Σύνολο: ${monthlyTotal.toFixed(2)} €</span>
                `;
                block.appendChild(header);

                // Render lines inside month categories securely
                monthlyItems.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'expense-row';

                    const statusClass = item.status === 'paid' ? 'status-paid' : 'status-unpaid';
                    const statusText = item.status === 'paid' ? 'Πληρωμένο' : 'Απλήρωτο';
                    const editedLabel = item.isEdited ? '<span class="is-edited">(Τροποποιήθηκε)</span>' : '';

                    row.innerHTML = `
                        <div class="expense-info">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            <strong>${escapeHTML(item.name)}</strong>
                            ${editedLabel}
                        </div>
                        <div><strong>${(Number(item.cost) || 0).toFixed(2)} €</strong></div>
                    `;
                    block.appendChild(row);
                });

                container.appendChild(block);
            });
        }
    </script>
</body>
</html>
